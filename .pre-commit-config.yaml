default_stages: [pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
      - id: ruff-format
        args: [--check]
  - repo: local
    hooks:
      - id: pyright
        name: type check
        entry: uv run pyright src/
        language: system
        pass_filenames: false
        always_run: true
      - id: pytest
        name: tests
        entry: uv run pytest -x -v
        language: system
        pass_filenames: false
        always_run: true
