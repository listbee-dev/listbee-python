name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [api-changed]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run pyright src/

      - name: Test
        run: uv run pytest -x -v --cov=listbee --cov-report=term-missing

  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - name: Fetch OpenAPI spec
        run: curl -sf https://api.listbee.so/openapi.json -o openapi.json
      - name: Check for API drift
        run: uv run python scripts/validate_spec.py --spec openapi.json
